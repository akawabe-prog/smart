<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>カート ｜ SMART SERIES</title>
<meta name="robots" content="noindex">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-root="">
<div id="site-header"></div>

<section class="section--tight" style="padding-top:clamp(40px,6vw,72px)">
  <div class="wrap" style="max-width:980px">
    <nav class="breadcrumb"><a href="./">SMART SERIES</a> / カート</nav>
    <div style="display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap">
      <h1 class="h-section">カート</h1>
      <span id="cart-count" class="muted" style="font-family:var(--font-en);font-weight:700">—</span>
    </div>

    <!-- 明細 -->
    <div id="cart-list" class="mt-m"></div>

    <!-- 空状態 -->
    <div id="cart-empty" style="display:none;text-align:center;padding:64px 0">
      <p class="lead mx-auto center">カートは空です。</p>
      <p id="cart-note" class="muted center" style="font-size:13px;margin-top:8px"></p>
      <div class="stack-cta mt-m center"><a href="series/" class="btn btn--lg">シリーズを見る</a></div>
    </div>

    <!-- 合計 -->
    <div id="cart-summary" class="mt-l" style="display:none">
      <div style="display:flex;justify-content:flex-end;align-items:baseline;gap:18px;padding:20px 0;border-top:1px solid var(--line)">
        <span class="muted" style="font-size:14px">合計（税込）</span>
        <span id="cart-total" class="price" style="font-size:34px;color:#fff">¥0</span>
      </div>
      <p class="muted" style="text-align:right;font-size:12px">送料・お支払い方法はご購入手続きで確定します。</p>
      <div style="display:flex;justify-content:flex-end;gap:14px;margin-top:20px;flex-wrap:wrap">
        <a href="./#series" class="btn btn--ghost">買い物を続ける</a>
        <a href="https://www.customjapan.net/cart" class="btn btn--lg">ご購入手続きへ</a>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script type="module" src="assets/js/components.js?v=7"></script>
<script type="module" src="assets/js/cart.js?v=7"></script>
<script type="module" src="assets/js/motion.js?v=7"></script>
<style>
.cart-row { display: grid; grid-template-columns: 84px 1fr auto auto auto; gap: 18px; align-items: center; padding: 18px 0; border-bottom: 1px solid var(--line-2); }
.cr-media { width: 84px; height: 84px; background: #fff; border-radius: 6px; overflow: hidden; display: grid; place-items: center; }
.cr-media img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }
.cr-noimg { color: #bbb; font-size: 10px; font-weight: 700; }
.cr-name { font-weight: 700; font-size: 15px; }
.cr-unit { font-size: 12.5px; color: var(--muted); margin-top: 4px; }
.cr-line { font-family: var(--font-en); font-weight: 800; font-size: 17px; min-width: 90px; text-align: right; }
.cr-del { width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 999px; background: transparent; color: var(--muted); }
.cr-del:hover { border-color: #a13636; color: #ff8a8a; }
@media (max-width: 640px) {
  .cart-row { grid-template-columns: 64px 1fr auto; grid-template-areas: "m b d" "m q l"; }
  .cr-media { grid-area: m; width: 64px; height: 64px; }
  .cr-body { grid-area: b; } .qty { grid-area: q; } .cr-line { grid-area: l; } .cr-del { grid-area: d; justify-self: end; }
}
</style>
</body>
</html>
