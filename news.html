<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ニュース ｜ SMART SERIES</title>
<meta name="description" content="Smart Series（スマートシリーズ）の新製品リリース・メディア掲載情報。">
<link rel="canonical" href="https://smartseries.customjapan.net/news">
<meta property="og:url" content="https://smartseries.customjapan.net/news">
<meta property="og:type" content="website">
<meta property="og:site_name" content="SMART SERIES ｜ Custom Japan">
<meta property="og:image" content="/assets/media/tmcs2026-crowd.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="/assets/media/tmcs2026-crowd.jpg">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body data-root="">
<div id="site-header"></div>

<section class="section" style="padding-top:clamp(56px,8vw,110px)">
  <div class="wrap wrap-narrow">
    <nav class="breadcrumb"><a href="./">SMART SERIES</a> / ニュース</nav>
    <p class="eyebrow">News &amp; Media</p>
    <h1 class="h-display h-en">News</h1>
    <p class="head-sub">ニュース・掲載情報</p>
  </div>
</section>

<section class="section--tight" style="padding-bottom:clamp(72px,10vw,160px)">
  <div class="wrap wrap-narrow">
    <div class="news-filter" id="news-filter">
      <button class="chip is-active" data-cat="all">すべて</button>
      <button class="chip" data-cat="新製品">新製品</button>
      <button class="chip" data-cat="メディア掲載">メディア掲載</button>
      <button class="chip" data-cat="イベント出展">イベント出展</button>
    </div>
    <ul class="news-list mt-m" id="news-list"></ul>
    <p class="muted mt-m" style="font-size:12.5px">※リリース日はPR TIMES掲載情報に基づきます。リンクは外部サイト（PR TIMES / 各メディア）が開きます。</p>
  </div>
</section>

<div id="site-footer"></div>
<script type="module" src="assets/js/components.js?v=18"></script>
<script type="module">
  import { NEWS } from './assets/js/news.js?v=18';
  const list = document.getElementById('news-list');
  const render = (cat) => {
    const tagCls = { 'メディア掲載': ' n-tag--media', 'イベント出展': ' n-tag--event' };
    const items = cat === 'all' ? NEWS : NEWS.filter(n => n.cat === cat);
    list.innerHTML = items.map((n, i) => `
      <li><a href="${n.url}" target="_blank" rel="noopener">
        <time>${n.date}</time>
        <span class="n-tag${tagCls[n.cat] || ''}">${n.cat}</span>
        ${i === 0 && cat === 'all' ? '<span class="n-new">NEW</span>' : ''}
        <span class="n-title">${n.title}</span>
        <span class="n-ext">↗</span>
      </a></li>`).join('');
  };
  render('all');
  document.querySelectorAll('#news-filter .chip').forEach(c =>
    c.addEventListener('click', () => {
      document.querySelectorAll('#news-filter .chip').forEach(x => x.classList.toggle('is-active', x === c));
      render(c.dataset.cat);
    }));
  import('./assets/js/motion.js?v=18');
</script>
<style>
.news-filter { display: flex; gap: 10px; flex-wrap: wrap; }
.n-new { font-size: 9px; font-weight: 800; letter-spacing: .1em; color: #0a0a0b; background: var(--gold); border-radius: 999px; padding: 2px 7px; }
.n-ext { margin-left: auto; color: var(--muted); font-size: 13px; }
.n-tag--media { color: #ff5a5a; border-color: rgba(255,90,90,.5); }
.n-tag--event { color: #6ea0ff; border-color: rgba(110,160,255,.5); }
.news-list li { border-bottom: 1px solid var(--line-2); }
.news-list a { display: flex; align-items: baseline; gap: 18px; padding: 20px 4px; transition: background .2s; flex-wrap: wrap; }
.news-list a:hover { background: var(--bg-2); }
.news-list time { font-family: var(--font-en); font-weight: 700; font-size: 13px; color: var(--muted); min-width: 86px; }
.n-tag { font-size: 10px; font-weight: 800; letter-spacing: .08em; color: var(--gold); border: 1px solid var(--gold-line); border-radius: 999px; padding: 3px 10px; white-space: nowrap; }
.n-title { font-weight: 600; font-size: 15px; flex: 1; min-width: 240px; }
.news-list a:hover .n-title { color: var(--gold-hi); }
</style>
</body>
</html>
